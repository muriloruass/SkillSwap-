<div class="container job-details-page">
  
  <!-- Loading and Error State -->
  <app-loading-spinner [isLoading]="isLoading"></app-loading-spinner>
  
  <div *ngIf="errorMessage" class="error-wrapper">
    <app-error-message [message]="errorMessage"></app-error-message>
    <button class="btn btn-outline" (click)="goBack()">Go Back to Search</button>
  </div>

  <!-- Job Content (Só mostra se encontrou um Job) -->
  <div *ngIf="!isLoading && !errorMessage && job" class="job-split-layout">
    
    <!-- ESQUERDA: Texto Principal -->
    <div class="job-main-info">
      <button class="back-link" (click)="goBack()">← Back to Search</button>
      
      <div class="job-header">
        <span class="badge badge-open">{{ job.category }}</span>
        <h1>{{ job.title }}</h1>
        <div class="job-meta">
          <span><strong>Status:</strong> {{ job.status | uppercase }}</span>
          <span><strong>Job ID:</strong> {{ job.id }}</span>
        </div>
      </div>

      <div class="job-description">
        <h2>About the Project</h2>
        <p>{{ job.description }}</p>
      </div>
    </div>

    <!-- DIREITA: Valores e "Call to Action" -->
    <div class="job-sidebar">
      <div class="sidebar-card">
        <h3>Project Budget</h3>
        <p class="budget-price">💰 ${{ job.budget }}</p>
        
        <p class="sidebar-info">Are you the perfect fit for this job? Submit a proposal to the client.</p>
        
        <!-- Esse botão ainda não faz nada. Vamos criar a "Ação de Enviar Proposta" no Passo 3 -->
        <button class="btn btn-primary btn-block">Submit Proposal</button>
      </div>
    </div>

  </div>
</div>
