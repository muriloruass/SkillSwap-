<section class="profile-page">
  <h2>Meu Perfil</h2>

  <div *ngIf="loading">Carregando perfil...</div>

  <p *ngIf="errorMessage" class="error">
    {{ errorMessage }}
  </p>

  <div class="profile-card" *ngIf="user">
    <p><strong>Name:</strong> {{ user.name }}</p>
    <p><strong>Username:</strong> {{ user.username }}</p>
    <p><strong>Email:</strong> {{ user.email }}</p>
    <p><strong>Bio:</strong> {{ user.bio }}</p>
    <p><strong>Rating:</strong> {{ user.rating_avg || 'N/A' }}</p>
    <p><strong>Completed Jobs:</strong> {{ user.completed_jobs || 0 }}</p>

    <div *ngIf="user.skills?.length">
      <strong>Skills:</strong>
      <span *ngFor="let skill of user.skills; let last = last">
        {{ skill }}<span *ngIf="!last">, </span>
      </span>
    </div>
  </div>
</section>
